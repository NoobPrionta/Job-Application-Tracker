<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

    <!-- CSS Styles  -->
    <link rel="stylesheet" href="styles/styles.css">

    <!-- Tailwind css style link  -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- DaisyUi style link  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font link      -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<style>
    body{
        font-family: "Geist", sans-serif;
        
    }
</style>

    <!-- Font awesome link  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />


<body class="min-h-screen max-w-[1110px] mx-auto">
    <h1 class="text-[#002C5C] font-bold pt-8 text-2xl">Job Application Tracker</h1>

    <!-- Header for this Job Application Tracker  -->
    
    <section class="tracker-data mt-8 ">
        <div class="grid grid-cols-3 space-x-5 ">
            <div class="bg-[#f1f2f4ce] font-semibold p-4">
                <p>Total</p>
                <p class="font-bold">8</p>
            </div>
            <div class="bg-[#f1f2f4ce] font-semibold p-4">
                <p>Interview</p>
                <p class="font-bold text-green-700">0</p>
            </div>
            <div class="bg-[#f1f2f4ce] font-semibold p-4">
                <p>Rejected</p>
                <p class="font-bold text-red-700">0</p>
            </div>
            
        </div>
    </section>


    <!-- Cart section  -->

    <h2 class="my-8 text-[#002C5C] font-bold pt-2 text-xl">Available Jobs</h2>
    <div class="mb-4 space-x-3">
        <button class="btn btn-soft">All</button>
        <button class="btn btn-soft btn-success">Interview</button>
        <button class="btn btn-soft btn-error">Rejected</button>
    </div>


    <section>
        <div class="card w-auto bg-base-100 card-xs shadow-sm">
  <div class="card-body">
    <h2 class="card-title">Xsmall Card</h2>
    <p>A card component has a figure, a body part, and inside body there are title and actions parts</p>
    <div class="justify-end card-actions">
      <button class="btn btn-primary">Buy Now</button>
    </div>
  </div>
</div>









    </section>

    <!-- javascript link  -->
    <script src="script/script.js"></script>
</body>
</html>
